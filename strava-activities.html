<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strava Activities</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Your Strava Activities</h1>
    <button id="sync-btn">Sync Activities</button>
    <div id="activities-list"></div>
    <p><a href="/login.html">Connect different account</a></p>
  </div>
  <script>
    const hash = window.location.hash.substring(1)
    const params = new URLSearchParams(hash)
    const tokenFromUrl = params.get('access_token')
    const userIdFromUrl = params.get('user_id')

    if (tokenFromUrl && userIdFromUrl) {
      localStorage.setItem('strava_access_token', tokenFromUrl)
      localStorage.setItem('strava_user_id', userIdFromUrl)
      history.replaceState(null, '', '/strava-activities.html')
    }

    const token = localStorage.getItem('strava_access_token')
    const userId = localStorage.getItem('strava_user_id')

    if (!token || !userId) {
      window.location.href = '/login.html'
    }

    document.getElementById('sync-btn').addEventListener('click', loadActivities)

    async function loadActivities() {
      const list = document.getElementById('activities-list')
      list.innerHTML = '<p>Loading...</p>'

      try {
        const res = await fetch(`/api/strava/activities/${userId}`)

        if (!res.ok) throw new Error('Failed to fetch')

        const activities = await res.json()
        const oneMonthAgo = Date.now() - 30 * 24 * 60 * 60 * 1000
        const recent = activities.filter(a => new Date(a.start_date).getTime() > oneMonthAgo)

        if (recent.length === 0) {
          list.innerHTML = '<p>No activities in the last month.</p>'
          return
        }

        const ul = document.createElement('ul')
        recent.forEach(activity => {
          const li = document.createElement('li')
          li.textContent = `${activity.name} - ${new Date(activity.start_date).toLocaleDateString()} (${activity.type})`
          li.style.cursor = 'pointer'
          li.addEventListener('click', () => loadActivityGpx(activity.id))
          ul.appendChild(li)
        })
        list.innerHTML = ''
        list.appendChild(ul)
      } catch (err) {
        list.innerHTML = '<p>Error loading activities. Please try logging in again.</p>'
        localStorage.removeItem('strava_access_token')
        localStorage.removeItem('strava_user_id')
      }
    }

    async function loadActivityGpx(activityId) {
      window.location.href = `/?activityId=${activityId}&userId=${userId}`
    }

    loadActivities()
  </script>
</body>
</html>
