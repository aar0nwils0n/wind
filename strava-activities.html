<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strava Activities</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    }
    .activities-box {
      text-align: center;
      padding: 3rem;
      max-width: 600px;
      width: 100%;
    }
    .activities-box h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    #sync-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 2px solid rgba(0, 212, 255, 0.4);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #00d4ff;
      transition: all 0.2s ease;
      margin-bottom: 2rem;
    }
    #sync-btn:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: #00d4ff;
      transform: translateY(-2px);
    }
    #activities-list {
      text-align: left;
      margin-bottom: 2rem;
    }
    #activities-list ul {
      list-style: none;
      padding: 0;
    }
    #activities-list li {
      padding: 1rem 1.5rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #ccc;
      font-size: 1rem;
    }
    #activities-list li:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.4);
      color: #fff;
      transform: translateX(4px);
    }
    #activities-list p {
      color: #888;
    }
    .switch-account {
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }
    .switch-account:hover {
      color: #00d4ff;
    }
  </style>
</head>
<body>
  <div class="activities-box">
    <h1>Your Strava Activities</h1>
    <p class="subtitle">Select an activity to visualize in 3D</p>
    <button id="sync-btn">Sync Activities</button>
    <div id="activities-list"></div>
    <a href="/login.html" class="switch-account">Connect different account</a>
  </div>
  <script>
    const hash = window.location.hash.substring(1)
    const params = new URLSearchParams(hash)
    const tokenFromUrl = params.get('access_token')
    const userIdFromUrl = params.get('user_id')

    if (tokenFromUrl && userIdFromUrl) {
      localStorage.setItem('strava_access_token', tokenFromUrl)
      localStorage.setItem('strava_user_id', userIdFromUrl)
      history.replaceState(null, '', '/strava-activities.html')
    }

    const token = localStorage.getItem('strava_access_token')
    const userId = localStorage.getItem('strava_user_id')

    if (!token || !userId) {
      window.location.href = '/login.html'
    }

    document.getElementById('sync-btn').addEventListener('click', loadActivities)

    async function loadActivities() {
      const list = document.getElementById('activities-list')
      list.innerHTML = '<p>Loading...</p>'

      try {
        const res = await fetch(`/api/strava/activities/${userId}`)

        if (!res.ok) throw new Error('Failed to fetch')

        const activities = await res.json()
        const oneMonthAgo = Date.now() - 30 * 24 * 60 * 60 * 1000
        const recent = activities.filter(a => new Date(a.start_date).getTime() > oneMonthAgo)

        if (recent.length === 0) {
          list.innerHTML = '<p>No activities in the last month.</p>'
          return
        }

        const ul = document.createElement('ul')
        recent.forEach(activity => {
          const li = document.createElement('li')
          li.textContent = `${activity.name} - ${new Date(activity.start_date).toLocaleDateString()} (${activity.type})`
          li.addEventListener('click', () => loadActivityGpx(activity.id))
          ul.appendChild(li)
        })
        list.innerHTML = ''
        list.appendChild(ul)
      } catch (err) {
        list.innerHTML = '<p>Error loading activities. Please try logging in again.</p>'
        localStorage.removeItem('strava_access_token')
        localStorage.removeItem('strava_user_id')
      }
    }

    async function loadActivityGpx(activityId) {
      window.location.href = `/?activityId=${activityId}&userId=${userId}`
    }

    loadActivities()
  </script>
</body>
</html>
